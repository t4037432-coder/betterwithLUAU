<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Luau Hub</title>
    <link rel="stylesheet" href="style.css">
    <!-- Thư viện Cloudflare Turnstile (Mây cam) -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div id="system-wrapper">
        <!-- Khung xác thực bảo mật & Cloudflare Turnstile -->
        <div id="auth-box" class="panel">
            <header class="panel-header">
                <span class="status-dot"></span>
                <h2>SECURITY GATEWAY // VERIFICATION</h2>
            </header>
            <div class="panel-body">
                <p>Xác thực bảo mật hệ thống để tiếp tục:</p>
                
                <div class="input-group" style="margin-bottom: 8px;">
                    <input type="password" id="password" placeholder="Nhập mật khẩu hệ thống..." autocomplete="off">
                </div>
                
                <!-- Hiển thị sẵn mật khẩu 123456 cho người dùng biết -->
                <div style="font-size: 13px; color: #ff9f43; margin-bottom: 15px;">
                    💡 Mật khẩu truy cập hệ thống: <b style="color: var(--primary-color);">123456</b>
                </div>

                <!-- Đám mây cam Cloudflare Turnstile -->
                <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-theme="dark"></div>

                <button id="auth-btn" style="width: 100%; margin-top: 15px;">TRUY CẬP HỆ THỐNG</button>
                <div id="error-msg" class="error-text"></div>
            </div>
        </div>

        <!-- Nội dung chính sau khi vượt qua màn hình đen -->
        <main id="content" class="hidden">
            <nav class="top-nav">
                <h1>LUAU SCRIPT ARCHIVE</h1>
                <div class="system-stats">Trạng thái: <span class="online">HOẠT ĐỘNG</span></div>
            </nav>
            
            <section class="container" id="card-container">
                <!-- Nội dung các danh mục script sẽ tự nạp ở đây -->
            </section>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
