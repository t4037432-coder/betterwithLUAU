<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Luau Hub - Verification System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Thư viện Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div id="system-wrapper">
        
        <!-- BƯỚC 1: XÁC THỰC MẬT KHẨU HỆ THỐNG (ĐÃ VÁ LỖI HIỂN THỊ GỢI Ý) -->
        <div id="step-1-box" class="panel">
            <header class="panel-header">
                <span class="status-dot"></span>
                <h2>STEP 1 // SECURITY GATEWAY</h2>
            </header>
            <div class="panel-body">
                <p>Xác thực bảo mật hệ thống để tiếp tục:</p>
                
                <div class="input-group" style="margin-bottom: 12px;">
                    <!-- Đã bỏ hoàn toàn chữ gợi ý 123456 ở placeholder -->
                    <input type="password" id="gateway-password" placeholder="Nhập mật khẩu bảo mật..." autocomplete="off">
                </div>

                <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-theme="dark"></div>

                <button onclick="verifyGatewayPassword()" style="width: 100%; margin-top: 15px; padding: 12px; background: #00ffcc; color: #0b0f19; border: none; font-weight: bold; border-radius: 6px; cursor: pointer;">XÁC THỰC MẬT KHẨU</button>
                <div id="error-msg-1" class="error-text" style="color: #ff4757; margin-top: 10px; font-size: 13px;"></div>
            </div>
        </div>

        <!-- BƯỚC 2: ĐĂNG KÝ EMAIL VÀ XÁC NHẬN MÃ OTP 6 SỐ -->
        <div id="step-2-box" class="panel hidden">
            <header class="panel-header">
                <span class="status-dot"></span>
                <h2>STEP 2 // EMAIL OTP VERIFICATION</h2>
            </header>
            <div class="panel-body">
                <p style="margin-bottom: 15px; color: #94a3b8;" id="otp-instruction">Nhập Email của bro để hệ thống gửi mã xác nhận 6 chữ số:</p>
                
                <!-- Form Nhập Email -->
                <div id="email-form-section">
                    <div class="input-group" style="margin-bottom: 10px;">
                        <input type="email" id="user-email-input" placeholder="Ví dụ: myemail@gmail.com" autocomplete="off">
                    </div>
                    <button onclick="sendOtpCode()" style="width: 100%; padding: 12px; background: #00ffcc; color: #0b0f19; border: none; font-weight: bold; border-radius: 6px; cursor: pointer;">GỬI MÃ OTP 6 SỐ</button>
                </div>

                <!-- Form Nhập Mã OTP (Mặc định ẩn, hiện ra sau khi bấm gửi mã) -->
                <div id="otp-form-section" class="hidden">
                    <div class="input-group" style="margin-bottom: 10px;">
                        <input type="text" id="otp-code-input" placeholder="Nhập 6 chữ số mã OTP..." maxlength="6" autocomplete="off" style="letter-spacing: 4px; font-weight: bold; text-align: center; font-size: 16px;">
                    </div>
                    <button onclick="verifyOtpCode()" style="width: 100%; padding: 12px; background: #ff9f43; color: #0b0f19; border: none; font-weight: bold; border-radius: 6px; cursor: pointer;">XÁC NHẬN MÃ OTP & ĐĂNG KÝ</button>
                </div>

                <div id="error-msg-2" class="error-text" style="color: #ff4757; margin-top: 10px; font-size: 13px;"></div>
            </div>
        </div>

        <!-- BƯỚC 3: TRANG CHÍNH CÓ 3 MỤC -->
        <main id="step-3-box" class="hidden">
            <nav class="top-nav">
                <h1>LUAU SCRIPT ARCHIVE</h1>
                <div class="system-stats">Tài khoản Email: <span id="current-user-display" style="color: #00ffcc;"></span> | Trạng thái: <span class="online">HOẠT ĐỘNG</span></div>
            </nav>
            
            <section class="container" id="card-container">
                <!-- Nội dung các mục tự động nạp -->
            </section>
        </main>
    </div>

    <!-- Script xử lý toàn bộ quy trình bảo mật và gửi OTP giả lập -->
    <script>
        const SYSTEM_CONFIG = {
            accessKey: "123456",
            sections: [
                {
                    title: "1. New (Dành cho người mới)",
                    description: "Xem script cơ bản bên dưới. Bấm nút để chuyển hướng sang trang success.",
                    codeSnippet: 'print("Hello Roblox!")\nlocal score = 10\nprint("Score is: " .. score)',
                    btnAction: "redirect",
                    redirectUrl: "success.html"
                },
                {
                    title: "2. Know Luau? Join Now (Khối Cầu Vồng Tử Vong)",
                    description: "Script tạo khối vuông lượn sóng bay sắc cầu vồng, chạm vào là người chơi chết ngay lập tức.",
                    codeSnippet: 'local part = Instance.new("Part")\npart.Size = Vector3.new(5, 5, 5)\npart.Anchored = true\npart.Parent = workspace\n\n-- Hiệu ứng cầu vồng & chạm vào chết\ntask.spawn(function()\n    while true do\n        part.Color = Color3.fromHSV(tick() % 5 / 5, 1, 1)\n        for _, child in ipairs(workspace:GetChildren()) do\n            if child:IsA("Model") and child:FindFirstChild("Humanoid") then\n                local hrp = child:FindFirstChild("HumanoidRootPart")\n                if hrp and (hrp.Position - part.Position).Magnitude < 4 then\n                    child.Humanoid.Health = 0\n                end\n            end\n        end\n        task.wait(0.1)\n    end\nend)',
                    btnAction: "redirect",
                    redirectUrl: "https://www.google.com"
                },
                {
                    title: "3. Năng Cao (Full Module)",
                    description: "Hệ thống code chuyên sâu. Yêu cầu nhập Key 7 ngày để mở khóa.",
                    codeSnippet: '-- [HỆ THỐNG ĐÃ MỞ KHÓA THÀNH CÔNG]\nlocal advanced_module = require(script.AdvancedCore);\nadvanced_module:InitializeFullFeatures();\nprint("Luau Full Module Loaded Successfully!");',
                    btnAction: "key_wall",
                    buttonLink: "https://lootdest.org/s?sEinb7ej",
                    redirectUrl: "success.html"
                }
            ]
        };

        let generatedOtp = "";
        let pendingEmail = "";

        // Kiểm tra trạng thái lưu trước đó
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("gateway_verified") === "true") {
                document.getElementById("step-1-box").classList.add("hidden");
                document.getElementById("step-2-box").classList.remove("hidden");
            }
        });

        // Bước 1: Kiểm tra mật khẩu 123456 chính xác tuyệt đối (Không cho nhập bậy)
        function verifyGatewayPassword() {
            const pass = document.getElementById("gateway-password").value.trim();
            const err = document.getElementById("error-msg-1");

            if (pass !== SYSTEM_CONFIG.accessKey) {
                err.innerText = "Mật khẩu hệ thống không chính xác!";
                return;
            }

            localStorage.setItem("gateway_verified", "true");
            document.getElementById("step-1-box").classList.add("hidden");
            document.getElementById("step-2-box").classList.remove("hidden");
        }

        // Bước 2.1: Gửi mã OTP 6 số về Email hợp lệ
        function sendOtpCode() {
            const emailInput = document.getElementById("user-email-input").value.trim();
            const err = document.getElementById("error-msg-2");

            // Kiểm tra định dạng email chặt chẽ (phải có dạng chuẩn như @gmail.com, @yahoo.com,...)
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput)) {
                err.innerText = "Vui lòng nhập địa chỉ Email hợp lệ (ví dụ: name@gmail.com)!";
                return;
            }

            pendingEmail = emailInput;
            // Tạo ngẫu nhiên mã OTP 6 chữ số
            generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Giả lập hệ thống gửi mã (hiển thị thông báo kèm mã OTP mô phỏng để test cho dễ)
            err.style.color = "#00ffcc";
            err.innerText = `📩 Mã OTP 6 số đã được gửi đến ${pendingEmail}!\n(Mã xác nhận mô phỏng của bro là: ${generatedOtp})`;

            // Ẩn form nhập email, hiện form nhập mã OTP
            document.getElementById("email-form-section").classList.add("hidden");
            document.getElementById("otp-form-section").classList.remove("hidden");
            document.getElementById("otp-instruction").innerText = `Nhập mã OTP 6 số đã gửi đến: <b style="color: #00ffcc;">${pendingEmail}</b>`;
        }

        // Bước 2.2: Xác thực mã OTP người dùng nhập vào
        function verifyOtpCode() {
            const userOtp = document.getElementById("otp-code-input").value.trim();
            const err = document.getElementById("error-msg-2");

            if (userOtp !== generatedOtp) {
                err.style.color = "#ff4757";
                err.innerText = "Mã OTP không chính xác! Vui lòng kiểm tra lại.";
                return;
            }

            // Đăng ký thành công, lưu thông tin tài khoản email
            localStorage.setItem("luau_logged_user", pendingEmail);
            
            document.getElementById("step-2-box").classList.add("hidden");
            document.getElementById("step-3-box").classList.remove("hidden");
            document.getElementById("current-user-display").innerText = pendingEmail;

            renderCards();
        }

        // Bước 3: Render danh sách các mục
        function renderCards() {
            const container = document.getElementById("card-container");
            if (!container) return;

            container.innerHTML = "";
            const currentUser = localStorage.getItem("luau_logged_user");

            SYSTEM_CONFIG.sections.forEach((section, index) => {
                const card = document.createElement("div");
                card.className = "card";

                let actionHtml = "";
                const userKeyStatus = localStorage.getItem(`luau_key_verified_${currentUser}`);

                if (section.btnAction === "key_wall") {
                    if (userKeyStatus === "true") {
                        actionHtml = `
                            <div style="margin-top: 15px; border-top: 1px dashed #1f293d; padding-top: 15px;">
                                <div style="color: #00ffcc; font-size: 13px; margin-bottom: 8px;">✅ Tài khoản đã được ghi nhớ Key 7 ngày!</div>
                                <button onclick="window.location.href='${section.redirectUrl}'" style="width: 100%; padding: 10px; background: #00ffcc; color: #0b0f19; border: none; font-weight: bold; border-radius: 6px; cursor: pointer;">
                                    TRUY CẬP NGAY
                                </button>
                            </div>
                        `;
                    } else {
                        actionHtml = `
                            <div style="margin-top: 15px; border-top: 1px dashed #1f293d; padding-top: 15px;">
                                <p style="font-size: 13px; color: #ff9f43; margin-bottom: 8px;">🔒 Nhập Key 7 ngày để mở khóa:</p>
                                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                    <input type="text" id="key-input-${index}" placeholder="Dán key luaurb_..." style="flex: 1; padding: 10px; background: #060911; border: 1px solid #1f293d; color: #fff; border-radius: 6px; font-family: monospace;">
                                    <button onclick="verifyKey(${index}, '${section.redirectUrl}')" style="padding: 10px 15px; background: #00ffcc; color: #0b0f19; border: none; font-weight: bold; border-radius: 6px; cursor: pointer;">XÁC THỰC</button>
                                </div>
                                <a href="${section.buttonLink}" target="_blank" style="display: inline-block; color: #00ffcc; font-size: 13px; text-decoration: underline;">👉 Bấm vào đây để lấy Key Lootlabs (2 phút)</a>
                            </div>
                        `;
                    }
                } else {
                    let targetUrl = (index === 0) ? "success.html" : "https://www.google.com";
                    actionHtml = `
                        <button onclick="window.location.href='${targetUrl}'" style="margin-top: 15px; width: 100%; padding: 10px; background: #00ffcc; color: #0b0f19; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s;">
                            CLICK HERE (Chuyển đến trang tạm thời)
                        </button>
                    `;
                }

                card.innerHTML = `
                    <h3>${section.title}</h3>
                    <p style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;">${section.description}</p>
                    <pre style="background: #060911; padding: 12px; border-radius: 6px; overflow-x: auto; color: #00ffcc; font-family: monospace; font-size: 13px;"><code>${section.codeSnippet}</code></pre>
                    ${actionHtml}
                `;

                container.appendChild(card);
            });
        }

        // Xác thực Key cho Mục 3
        function verifyKey(index, redirectUrl) {
            const inputField = document.getElementById(`key-input-${index}`);
            const userEnteredKey = inputField.value.trim();
            const currentUser = localStorage.getItem("luau_logged_user");

            let savedData = localStorage.getItem("luau_key_data");
            
            if (!savedData) {
                alert("Bạn chưa có Key! Vui lòng bấm vào link lấy key ở bên dưới.");
                return;
            }

            let keyObj = JSON.parse(savedData);
            const now = new Date().getTime();

            if (now > keyObj.expiresAt) {
                alert("Key của bạn đã hết hạn 7 ngày. Vui lòng lấy key mới!");
                return;
            }

            if (userEnteredKey === keyObj.key) {
                localStorage.setItem(`luau_key_verified_${currentUser}`, "true");
                alert("Xác thực thành công! Tài khoản Email đã được ghi nhớ Key 7 ngày.");
                window.location.href = redirectUrl;
            } else {
                alert("Key không chính xác! Hãy kiểm tra lại.");
            }
        }
    </script>
</body>
</html>
