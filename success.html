<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Tạm Thời</title>
    <style>
        body {
            background-color: #05070b;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .box {
            border: 1px dashed #00ffcc;
            padding: 30px;
            border-radius: 10px;
            background: rgba(13, 19, 33, 0.95);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        h1 { font-size: 22px; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>// TRANG WEB TẠM THỜI ĐANG PHÁT TRIỂN</h1>
        <p>Nội dung đang được cập nhật, vui lòng quay lại sau!</p>
        <br>
        <a href="index.html" style="color: #ff007f; text-decoration: none; font-weight: bold;">&larr; Quay lại trang chủ</a>
    </div>
</body>
</html>
